name: Verify

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run web:lint

      - name: Check formatting
        run: npm run web:format

      - name: Typecheck frontend
        run: npm run web:typecheck

      - name: Test frontend
        run: npm run web:test

      - name: Build frontend
        run: npm run web:build

      - name: Analyze frontend bundle
        run: npm run web:build:analyze

      - name: Install Playwright browsers
        run: npm --workspace @lumadock/web exec playwright install --with-deps chromium

      - name: Test frontend e2e
        run: npm run web:e2e

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Test backend
        run: npm run api:test

      - name: Build backend Docker image
        if: ${{ hashFiles('apps/api/Dockerfile') != '' }}
        run: docker build -t lumadock-api ./apps/api
