<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumaDock Offline</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f7f8fa;
        color: #151922;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(640px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        color: #5a6472;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LumaDock is offline</h1>
      <p>Reconnect and refresh to continue the Vue frontend learning lab.</p>
    </main>
  </body>
</html>
